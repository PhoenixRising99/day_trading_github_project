name: Alpaca Paper Strategy Entry

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type SUBMIT_ALPACA_PAPER_STRATEGY_ORDER to submit a paper order"
        required: false
        default: ""
      allow_outside_entry_window:
        description: "Testing only. true lets the manual job scan/submit outside the strategy entry window."
        required: true
        default: "false"

  # WHY THIS SCHEDULE LOOKS THE WAY IT DOES:
  # GitHub Actions cron firings are best-effort. During high-load periods
  # (worst at the start of each hour and during US mornings, i.e. exactly
  # our entry window), scheduled runs are delayed -- often by 10-30+
  # minutes -- and frequently dropped outright. A */5 schedule that needs
  # ~10 independent firings inside a 44-minute window is therefore
  # unreliable: on 2026-07-01 GitHub delivered exactly one of them, at
  # 12:19 PM ET, after the window had closed.
  #
  # So instead: fire a FEW redundant times near window-open, and let the
  # job itself loop every 5 minutes (like the long-proven paper_scan.yml
  # pattern) until the window is over. Only one firing needs to arrive.
  #
  # GitHub cron is UTC. The entry window is 10:15-10:59 AM ET.
  #   14:00/14:10 UTC = 10:00/10:10 AM EDT (daylight time)  -> loops ~1h
  #   15:00/15:10 UTC = 10:00/10:10 AM EST (standard time)  -> loops ~1h
  # The wrong-season pair still runs but each 5-minute check exits in
  # ~2 seconds as "outside_entry_window" (the script checks the ET clock
  # before doing any work), so it is cheap and harmless. The concurrency
  # group prevents overlapping copies.
  schedule:
    - cron: "0,10 14-15 * * 1-5"

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"
  ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
  ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
  ALPACA_PAPER: "true"
  ALPACA_PAPER_ORDER_SUBMISSION_ENABLED: ${{ secrets.ALPACA_PAPER_ORDER_SUBMISSION_ENABLED }}

concurrency:
  group: alpaca-paper-strategy-entry
  cancel-in-progress: false

jobs:
  alpaca-paper-strategy-entry:
    runs-on: ubuntu-latest
    # Worst case: standard-time firing at 9:00 AM ET loops cheap
    # out-of-window checks for ~2h05m until 11:05 ET. Keep headroom.
    timeout-minutes: 150

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scan for an entry signal every 5 minutes until the window closes
        env:
          CONFIRM_INPUT: ${{ github.event.inputs.confirm }}
          ALLOW_OUTSIDE_ENTRY_WINDOW_INPUT: ${{ github.event.inputs.allow_outside_entry_window }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          CONFIRM_VALUE="$CONFIRM_INPUT"
          EXTRA_ARGS=""

          if [ "$EVENT_NAME" = "schedule" ]; then
            CONFIRM_VALUE="SUBMIT_ALPACA_PAPER_STRATEGY_ORDER"
          fi

          if [ "$ALLOW_OUTSIDE_ENTRY_WINDOW_INPUT" = "true" ]; then
            EXTRA_ARGS="--allow-outside-entry-window"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Manual test runs outside the window do a single check and exit,
          # instead of looping until 11:05 ET.
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$ALLOW_OUTSIDE_ENTRY_WINDOW_INPUT" = "true" ]; then
            python alpaca_paper_strategy_entry_job.py --confirm "$CONFIRM_VALUE" $EXTRA_ARGS
            exit 0
          fi

          while :; do
            NOW_ET="$(TZ=America/New_York date +%H:%M)"
            if [ "$NOW_ET" \> "11:04" ]; then
              echo "ET time $NOW_ET is past the entry window. Done for today."
              break
            fi

            # Pick up any state committed by the position monitor since the
            # last iteration (e.g. a reconciliation), so the
            # one-trade-per-day guard always sees the latest state.
            git pull --rebase --autostash || true

            python alpaca_paper_strategy_entry_job.py --confirm "$CONFIRM_VALUE" $EXTRA_ARGS

            if [ -f data/logs/broker/alpaca_open_position_state.json ]; then
              git add data/logs/broker/alpaca_open_position_state.json
              if ! git diff --cached --quiet; then
                git commit -m "Update Alpaca paper position state [skip ci]"
                git push || { git pull --rebase --autostash && git push; } || true
              fi
            fi

            sleep 300
          done

      - name: Upload broker strategy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpaca-paper-strategy-entry-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            data/logs/broker/
            data/logs/scans/
          retention-days: 14
