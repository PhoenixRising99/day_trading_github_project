name: Alpaca Paper Strategy Entry

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type SUBMIT_ALPACA_PAPER_STRATEGY_ORDER to submit a paper order"
        required: false
        default: ""
      allow_outside_entry_window:
        description: "Testing only. true lets the manual job scan/submit outside the strategy entry window."
        required: true
        default: "false"

  # GitHub Actions cron is UTC. This range covers the 10:15-10:59 AM ET
  # strategy entry window across BOTH standard time and daylight time, so
  # the schedule does not need to change with DST:
  #   14:15-14:59 UTC = 10:15-10:59 AM EDT (daylight time, e.g. summer)
  #   15:15-15:59 UTC = 10:15-10:59 AM EST (standard time, e.g. winter)
  # Each run is a single quick check, NOT a multi-hour wait. The Python
  # script itself checks the real US/Eastern wall-clock time and exits
  # cleanly with reason "outside_entry_window" on any run that lands outside
  # the actual window, so this is safe even though the UTC range above is
  # wider than the real ET window and even if GitHub fires a run a few
  # minutes late.
  schedule:
    - cron: "*/5 14-15 * * 1-5"

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"
  ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
  ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
  ALPACA_PAPER: "true"
  ALPACA_PAPER_ORDER_SUBMISSION_ENABLED: ${{ secrets.ALPACA_PAPER_ORDER_SUBMISSION_ENABLED }}

concurrency:
  group: alpaca-paper-strategy-entry
  cancel-in-progress: false

jobs:
  alpaca-paper-strategy-entry:
    runs-on: ubuntu-latest
    # No internal wait loop anymore, so this no longer needs hours of budget.
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check for a strategy entry signal and submit if qualified
        env:
          CONFIRM_INPUT: ${{ github.event.inputs.confirm }}
          ALLOW_OUTSIDE_ENTRY_WINDOW_INPUT: ${{ github.event.inputs.allow_outside_entry_window }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          CONFIRM_VALUE="$CONFIRM_INPUT"
          EXTRA_ARGS=""

          if [ "$EVENT_NAME" = "schedule" ]; then
            CONFIRM_VALUE="SUBMIT_ALPACA_PAPER_STRATEGY_ORDER"
          fi

          if [ "$ALLOW_OUTSIDE_ENTRY_WINDOW_INPUT" = "true" ]; then
            EXTRA_ARGS="--allow-outside-entry-window"
          fi

          python alpaca_paper_strategy_entry_job.py \
            --confirm "$CONFIRM_VALUE" \
            $EXTRA_ARGS

      - name: Upload broker strategy artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpaca-paper-strategy-entry-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            data/logs/broker/
            data/logs/scans/
          retention-days: 14

      - name: Commit updated position state if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash || true

          if [ -f data/logs/broker/alpaca_open_position_state.json ]; then
            git add data/logs/broker/alpaca_open_position_state.json
          fi

          if git diff --cached --quiet; then
            echo "No position-state changes to commit."
          else
            git commit -m "Update Alpaca paper position state [skip ci]"
            git push
          fi
