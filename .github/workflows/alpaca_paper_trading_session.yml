name: Alpaca Paper Trading Session

on:
  workflow_dispatch:
    inputs:
      confirm_entry:
        description: "Type SUBMIT_ALPACA_PAPER_STRATEGY_ORDER for a manual paper entry test"
        required: false
        default: ""
      confirm_exit:
        description: "Type SUBMIT_ALPACA_PAPER_EXIT_ORDER for a manual paper exit test"
        required: false
        default: ""
      allow_outside_entry_window:
        description: "Testing only. true runs one entry check outside the window."
        required: true
        default: "false"
      session_mode:
        description: "true runs a bounded session loop for cron-job.org; false performs one cycle."
        required: true
        default: "false"

# Scheduling is intentionally delegated to cron-job.org. GitHub's native cron
# was repeatedly delayed by 30 minutes to several hours and also created queued,
# overlapping session runs. cron-job.org should dispatch this workflow with
# session_mode=true. A second dispatch later in the day can hand off monitoring
# because each session is capped below the user's observed four-hour limit.

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"
  ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
  ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
  ALPACA_PAPER: "true"

  # Backward-compatible global switch.
  ALPACA_PAPER_ORDER_SUBMISSION_ENABLED: ${{ secrets.ALPACA_PAPER_ORDER_SUBMISSION_ENABLED }}

  # Optional separate switches. If unset, code falls back to the global switch.
  ALPACA_PAPER_ENTRY_SUBMISSION_ENABLED: ${{ secrets.ALPACA_PAPER_ENTRY_SUBMISSION_ENABLED }}
  ALPACA_PAPER_EXIT_SUBMISSION_ENABLED: ${{ secrets.ALPACA_PAPER_EXIT_SUBMISSION_ENABLED }}

concurrency:
  group: alpaca-paper-trading-session
  cancel-in-progress: false

jobs:
  alpaca-paper-trading-session:
    runs-on: ubuntu-latest
    timeout-minutes: 235

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run trading cycle or bounded session
        env:
          CONFIRM_ENTRY_INPUT: ${{ github.event.inputs.confirm_entry }}
          CONFIRM_EXIT_INPUT: ${{ github.event.inputs.confirm_exit }}
          ALLOW_OUTSIDE_ENTRY_WINDOW_INPUT: ${{ github.event.inputs.allow_outside_entry_window }}
          SESSION_MODE_INPUT: ${{ github.event.inputs.session_mode }}
        run: |
          CONFIRM_ENTRY="$CONFIRM_ENTRY_INPUT"
          CONFIRM_EXIT="$CONFIRM_EXIT_INPUT"

          # cron-job.org dispatches session_mode=true. That is an explicit
          # paper-only automation request, so confirmation strings are supplied
          # internally. API mode remains forced to paper.
          if [ "$SESSION_MODE_INPUT" = "true" ]; then
            CONFIRM_ENTRY="SUBMIT_ALPACA_PAPER_STRATEGY_ORDER"
            CONFIRM_EXIT="SUBMIT_ALPACA_PAPER_EXIT_ORDER"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          STATE_FILE="data/logs/broker/alpaca_open_position_state.json"

          commit_state_if_changed() {
            [ -f "$STATE_FILE" ] && git add "$STATE_FILE"
            [ -f data/logs/broker/alpaca_paper_exit_log.csv ] && \
              git add data/logs/broker/alpaca_paper_exit_log.csv

            if ! git diff --cached --quiet; then
              git commit -m "Update Alpaca paper position state [skip ci]"
              git push || { git pull --rebase --autostash && git push; } || true
            fi
          }

          run_one_cycle() {
            NOW_ET="$(TZ=America/New_York date +%H:%M)"

            if [ "$NOW_ET" \> "10:09" ] && [ "$NOW_ET" \< "11:05" ]; then
              python alpaca_paper_strategy_entry_job.py --confirm "$CONFIRM_ENTRY"
            elif [ "$ALLOW_OUTSIDE_ENTRY_WINDOW_INPUT" = "true" ]; then
              python alpaca_paper_strategy_entry_job.py \
                --confirm "$CONFIRM_ENTRY" \
                --allow-outside-entry-window
            fi

            python alpaca_paper_position_monitor.py --confirm "$CONFIRM_EXIT"
            commit_state_if_changed
          }

          # Manual/default dispatch: one quick cycle, then exit.
          if [ "$SESSION_MODE_INPUT" != "true" ]; then
            run_one_cycle
            exit 0
          fi

          # Bounded cron-job.org session. 220 minutes stays below the user's
          # observed four-hour limit. Use a later cron-job.org dispatch to hand
          # off monitoring when a position remains open.
          LOOP_START="$(date +%s)"
          MAX_SESSION_SECONDS=13200

          while :; do
            ELAPSED=$(( $(date +%s) - LOOP_START ))
            if [ "$ELAPSED" -gt "$MAX_SESSION_SECONDS" ]; then
              echo "Bounded session handoff after ${ELAPSED}s."
              break
            fi

            NOW_ET="$(TZ=America/New_York date +%H:%M)"
            if [ "$NOW_ET" \> "16:04" ]; then
              echo "ET time $NOW_ET is past market close. Session done."
              break
            fi

            # Before 10:05 ET there is no entry or overnight position to manage.
            if [ "$NOW_ET" \< "10:05" ]; then
              sleep 120
              continue
            fi

            git pull --rebase --autostash || true
            run_one_cycle

            if [ "$NOW_ET" \> "11:04" ]; then
              STATUS="$(python3 -c "import json; print(json.load(open('$STATE_FILE')).get('status',''))" 2>/dev/null || echo "none")"
              if [ "$STATUS" != "open" ]; then
                echo "Entry window closed and no open position tracked. Session done."
                break
              fi
            fi

            sleep 300
          done

      - name: Upload session artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpaca-paper-trading-session-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            data/logs/broker/
            data/logs/scans/
          retention-days: 14
