name: Paper Observation Scan

on:
  workflow_dispatch:

  # GitHub Actions cron runs in UTC in this workflow.
  #
  # Entry collector:
  # - 12:00 UTC = 8:00 AM ET during U.S. daylight time.
  # - Python waits/scans until the strategy window closes at 10:59 AM ET.
  # - Only one entry collector is scheduled to avoid stale-journal race conditions.
  #
  # Exit monitor:
  # - Every 15 minutes from 15:00-21:45 UTC.
  # - Python updates open paper trades only after the entry window closes.
  schedule:
    - cron: "0 12 * * 1-5"
    - cron: "*/15 15-21 * * 1-5"

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: paper-observation-scan
  cancel-in-progress: false

jobs:
  paper-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 230

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run paper scanner / exit tracker
        id: scan
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python paper_scan_job.py \
            --mode auto \
            --period 5d \
            --notes "github-actions paper observation" \
            --scan-every-seconds 300

      - name: Upload scan outputs
        uses: actions/upload-artifact@v4
        with:
          name: paper-scan-output-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            data/logs/scans/*.csv
            data/logs/paper_trading/paper_trade_journal.csv
          retention-days: 14

      - name: Commit updated paper journal if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add data/logs/paper_trading/paper_trade_journal.csv
          if git diff --cached --quiet; then
            echo "No journal changes to commit."
          else
            git commit -m "Update paper trading journal [skip ci]"
            git push
          fi
