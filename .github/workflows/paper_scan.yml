name: Paper Observation Scan

on:
  workflow_dispatch:

  # V9/V10/V11 entry window: 10:15 AM - 10:59 AM Eastern.
  # This runs every 5 minutes from 10:16 through 10:56 AM ET, Monday-Friday.
  schedule:
    - cron: "16-56/5 10 * * 1-5"
      timezone: "America/New_York"

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"

concurrency:
  group: paper-observation-scan
  cancel-in-progress: false

jobs:
  paper-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run paper scanner
        id: scan
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python paper_scan_job.py --period 5d --notes "github-actions paper observation"

      - name: Upload scan outputs
        uses: actions/upload-artifact@v4
        with:
          name: paper-scan-output-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            data/logs/scans/*.csv
            data/logs/paper_trading/paper_trade_journal.csv
          retention-days: 14

      - name: Commit updated paper journal if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/logs/paper_trading/paper_trade_journal.csv
          if git diff --cached --quiet; then
            echo "No journal changes to commit."
          else
            git commit -m "Update paper trading journal [skip ci]"
            git push
          fi
